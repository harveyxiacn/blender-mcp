name: Discord Changelog Test

# Manual end-to-end test for the changelog -> Discord webhook.
# Actions tab -> "Discord Changelog Test" -> Run workflow -> enter a version.
# Posts the matching changelog section to DISCORD_CHANGELOG_WEBHOOK, the same
# way release.yml does on a v* tag — without cutting a real release.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version/tag to announce (e.g. v0.3.1)"
        required: true
        default: "v0.3.1"

jobs:
  announce:
    name: Post changelog to Discord
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Post changelog to Discord
        env:
          DISCORD_CHANGELOG_WEBHOOK: ${{ secrets.DISCORD_CHANGELOG_WEBHOOK }}
        run: python scripts/discord_changelog.py "${{ inputs.version }}"
