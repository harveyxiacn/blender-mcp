name: Bug Report
description: Report a bug to help us improve blender-mcp
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Start Blender and enable the addon
        2. Launch the MCP server with '...'
        3. Send the following command '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: input
    id: blender-version
    attributes:
      label: Blender Version
      description: "e.g. 4.1.0, 5.0.1"
      placeholder: "4.1.0"
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python Version
      description: "e.g. 3.10, 3.11, 3.12"
      placeholder: "3.12"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows
        - macOS
        - Linux
    validations:
      required: true

  - type: dropdown
    id: mcp-client
    attributes:
      label: MCP Client
      description: Which MCP client are you using?
      options:
        - Cursor
        - Windsurf
        - Claude Desktop
        - Other
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Log Output
      description: Paste any relevant log output. This will be automatically formatted as code.
      render: shell
